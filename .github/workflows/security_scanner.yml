name: Security Scanner

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: security-scanner
  cancel-in-progress: false

permissions:
  contents: write
  security-events: read

jobs:
  scan-security:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Scan GitHub security data
        env:
          GITHUB_TOKEN: ${{ secrets.SECURITY_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          SECURITY_STATE_FILE: ${{ github.workspace }}/state/security_state.json
        run: python src/security_scanner/scan_security.py

      - name: Commit updated security state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/security_state.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update security scanner state [skip ci]"
            git push
          fi
